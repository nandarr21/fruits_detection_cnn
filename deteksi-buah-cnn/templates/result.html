<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hasil Deteksi - FreshCheck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(86,171,47,0.85) 0%, rgba(168,224,99,0.85) 100%),
                        url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            padding: 30px 0;
        }
        .main-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow: hidden;
            max-width: 480px;
            width: 100%;
        }
        .header-banner {
            background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%);
            color: #fff;
            padding: 28px 24px;
            text-align: center;
        }
        .header-banner h2 {
            font-weight: 700;
            margin: 0;
        }
        .body-section {
            padding: 28px 24px;
        }
        .preview-img {
            border-radius: 16px;
            border: 4px solid #f1f1f1;
            max-height: 240px;
            object-fit: cover;
        }
        .result-card {
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
        .result-fresh {
            background: #e6f7e9;
            border: 1px solid #b6e6c2;
            color: #2f7d3c;
        }
        .result-rotten {
            background: #fdeaea;
            border: 1px solid #f3b6b6;
            color: #c0392b;
        }
        .result-card i {
            font-size: 2.5rem;
        }
        .progress {
            height: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .btn-back {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            border: none;
            color: #fff;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px;
            margin-top: 20px;
        }
        .btn-back:hover {
            opacity: 0.9;
            color: #fff;
        }
        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            padding-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card mx-auto">
            <div class="header-banner">
                <i class="bi bi-apple" style="font-size: 2.5rem;"></i>
                <h2>FreshCheck</h2>
            </div>

            <div class="body-section">
                <div class="text-center">
                    <img src="{{ url_for('static', filename='uploads/' + filename) }}"
                         class="preview-img img-fluid">
                </div>

                <div class="result-card {{ 'result-fresh' if result.kelas == 'Segar' else 'result-rotten' }}">
                    <i class="bi {{ 'bi-check-circle-fill' if result.kelas == 'Segar' else 'bi-x-circle-fill' }}"></i>
                    <h4 class="mt-2 mb-1">Buah {{ result.kelas }}</h4>
                    <p class="mb-2 fw-semibold">{{ result.status }}</p>

                    <div class="progress bg-white">
                        <div class="progress-bar {{ 'bg-success' if result.kelas == 'Segar' else 'bg-danger' }}"
                             role="progressbar" style="width: {{ result.confidence }}%">
                        </div>
                    </div>
                    <small class="text-muted">Confidence: {{ result.confidence }}%</small>
                </div>

                <a href="{{ url_for('index') }}" class="btn btn-back w-100">
                    <i class="bi bi-arrow-repeat"></i> Coba Gambar Lain
                </a>
            </div>

            <div class="footer-note">
                Powered by CNN &middot; TensorFlow &amp; Flask
            </div>
        </div>
    </div>
</body>
</html>
