<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FreshCheck - Deteksi Kelayakan Buah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(86,171,47,0.85) 0%, rgba(168,224,99,0.85) 100%),
                        url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            padding: 30px 0;
        }
        .main-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow: hidden;
            max-width: 480px;
            width: 100%;
        }
        .header-banner {
            background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%);
            color: #fff;
            padding: 28px 24px;
            text-align: center;
        }
        .header-banner h2 {
            font-weight: 700;
            margin: 0;
        }
        .header-banner p {
            margin: 4px 0 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .body-section {
            padding: 28px 24px;
        }
        .upload-box {
            border: 2px dashed #c7e8a8;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            background: #f8fdf3;
            transition: 0.2s;
        }
        .upload-box:hover {
            border-color: #56ab2f;
            background: #f1faea;
        }
        .btn-predict {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            border: none;
            color: #fff;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px;
            transition: 0.2s;
        }
        .btn-predict:hover {
            opacity: 0.9;
            color: #fff;
        }
        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            padding-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card mx-auto">
            <div class="header-banner">
                <i class="bi bi-apple" style="font-size: 2.5rem;"></i>
                <h2>FreshCheck</h2>
                <p>Deteksi Kelayakan Buah</p>
            </div>

            <div class="body-section">
                <form action="{{ url_for('predict') }}" method="POST" enctype="multipart/form-data">
                    <div class="upload-box mb-3">
                        <i class="bi bi-cloud-arrow-up" style="font-size: 2rem; color: #56ab2f;"></i>
                        <p class="mb-2 mt-2 text-muted">Pilih gambar buah (jpg/png)</p>
                        <input class="form-control" type="file" name="file" accept="image/*" required>
                    </div>
                    <button class="btn btn-predict w-100" type="submit">
                        <i class="bi bi-search"></i> Deteksi Sekarang
                    </button>
                </form>
            </div>

            <div class="footer-note">
            </div>
        </div>
    </div>
</body>
</html>
